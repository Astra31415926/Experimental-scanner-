    <title>QRGB-13: SCI Multi-Layer Encoder</title>
    <meta name="description" content="Encode 3 QR codes in 1 image. Spectral separation via SCI Model.">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --r-color: #FF004D;
            --g-color: #00FF41;
            --b-color: #0088FF;
            --bg-color: #050505;
        }
        
        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow-x: hidden;
            transition: background 0.5s;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        textarea {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid rgba(255,255,255,0.1);
            color: #fff;
            font-family: 'Inter', sans-serif;
            resize: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        textarea:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.4);
            background: rgba(30, 30, 30, 0.9);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        textarea.locked {
            opacity: 0.8;
            font-weight: 600;
        }
        textarea.locked-r { border-color: var(--r-color); box-shadow: 0 0 10px rgba(255,0,77,0.3); }
        textarea.locked-g { border-color: var(--g-color); box-shadow: 0 0 10px rgba(0,255,65,0.3); }
        textarea.locked-b { border-color: var(--b-color); box-shadow: 0 0 10px rgba(0,136,255,0.3); }

        /* Header Logo Colors */
        .logo-q, .logo-dash { color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        .logo-r { color: var(--r-color); text-shadow: 0 0 15px var(--r-color); }
        .logo-g { color: var(--g-color); text-shadow: 0 0 15px var(--g-color); }
        .logo-b { color: var(--b-color); text-shadow: 0 0 15px var(--b-color); }

        /* Viewfinder HUD */
        .viewfinder-corners {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 15;
            transition: all 0.3s;
        }
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        .tl { top: 0; left: 0; border-top: 3px solid; border-left: 3px solid; border-radius: 8px 0 0 0; }
        .tr { top: 0; right: 0; border-top: 3px solid; border-right: 3px solid; border-radius: 0 8px 0 0; }
        .bl { bottom: 0; left: 0; border-bottom: 3px solid; border-left: 3px solid; border-radius: 0 0 0 8px; }
        .br { bottom: 0; right: 0; border-bottom: 3px solid; border-right: 3px solid; border-radius: 0 0 8px 0; }
        
        /* State: Hunting (Pulse) */
        .viewfinder-hunting .corner { 
            border-color: var(--g-color); 
            box-shadow: 0 0 8px var(--g-color);
            animation: pulse 1.5s infinite alternate; 
        }
        
        /* State: Locked (Flash) */
        .viewfinder-locked .corner { 
            border-color: #fff; 
            box-shadow: 0 0 20px #fff; 
            width: 30px; height: 30px;
        }

        @keyframes pulse { 
            0% { opacity: 0.4; transform: scale(1); } 
            100% { opacity: 1; transform: scale(1.05); } 
        }
        
        @keyframes flash { 
            0% { opacity: 0; } 
            20% { opacity: 0.9; } 
            100% { opacity: 0; } 
        }
        .flash-anim { animation: flash 0.4s ease-out; }

        /* Progress Bar */
        .progress-track {
            position: absolute;
            top: -8px; left: 0; right: 0;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .progress-active { opacity: 1; }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--b-color), var(--g-color), var(--r-color));
            transition: width 0.1s linear;
        }

        /* Buttons */
        .btn-scan {
            background: linear-gradient(145deg, #fff, #ccc);
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .btn-scan:active { transform: scale(0.96); box-shadow: inset 2px 2px 5px #999; }
        
        .btn-mode {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .btn-mode:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }

        /* Dropdown */
        .dropdown-menu { 
            transform: translateY(-10px); opacity: 0; visibility: hidden; 
            transition: all 0.2s ease; 
        }
        .dropdown-menu.show { transform: translateY(0); opacity: 1; visibility: visible; }
        
        .modal-overlay { 
            opacity: 0; visibility: hidden; transition: all 0.3s ease; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); 
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.show .modal-content { transform: scale(1); }
    </style>
</head>

<script>
    // === TRANSLATIONS & UI SETUP ===
    const translations = {
        uk: { ph_r: "RED CHANNEL", ph_g: "GREEN CHANNEL", ph_b: "BLUE CHANNEL" },
        en: { ph_r: "RED CHANNEL", ph_g: "GREEN CHANNEL", ph_b: "BLUE CHANNEL" }
    };
    let currentLang = 'uk';

    // === DOM ELEMENTS ===
    const els = {
        r: document.getElementById('r-text'), 
        g: document.getElementById('g-text'), 
        b: document.getElementById('b-text'),
        main: document.getElementById('qr-main'), 
        ctx: document.getElementById('qr-main').getContext('2d', { willReadFrequently: true }),
        video: document.getElementById('video'), 
        freeze: document.getElementById('freeze-frame'),
        fCtx: document.getElementById('freeze-frame').getContext('2d', { willReadFrequently: true }),
        centralContainer: document.getElementById('central-container'), 
        flash: document.getElementById('flash-layer'),
        viewfinder: document.getElementById('viewfinder-ui'),
        progress: document.getElementById('progress-track'),
        progressFill: document.getElementById('progress-fill'),
        scanMainBtn: document.getElementById('scan-main-btn'),
        initActions: document.getElementById('init-actions'),
        scanActions: document.getElementById('scan-actions'),
        saveBtn: document.getElementById('save-btn'),
        dropdown: document.getElementById('dropdown')
    };

    // === CORE STATE (New Logic) ===
    const state = {
        scanning: false,
        locked: { r: false, g: false, b: false },
        results: { r: null, g: null, b: null },
        currentChannelIndex: 0,     // 0=R, 1=G, 2=B для round-robin
        frameSkip: 0,
        FRAME_SKIP_MAX: 3,
        accumulationStart: null,
        ACC_DURATION: 4000 // 4 seconds
    };

    // Reusable buffers
    let workBuffer = null;

    // === SMART CONTROLLER ===
    class SmartController {
        constructor() {
            this.gain = 1.0;
            this.offset = 0;
            this.k1 = 0.15;
            this.k2 = 0.25;
            this.prevBrightRatio = 0.5;
            this.failStreak = 0;
        }

        updateMetrics(imgData) {
            const d = imgData.data;
            let bright = 0, sum = 0, sumSq = 0;
            const len = d.length / 4;

            for (let i = 0; i < d.length; i += 4) {
                const v = d[i]; // grayscale value
                sum += v;
                sumSq += v * v;
                if (v > 240) bright++;
            }

            const mean = sum / len;
            const variance = (sumSq / len) - mean * mean;
            const contrast = Math.sqrt(variance);
            const brightRatio = bright / len;

            const deltaBright = brightRatio - this.prevBrightRatio;
            this.prevBrightRatio = brightRatio;

            // Feedback loop
            if (brightRatio > 0.35 || deltaBright > 0.1) {
                this.gain = Math.max(0.6, this.gain - 0.12);
                this.offset = Math.max(-120, this.offset - 8);
            } else if (brightRatio < 0.15) {
                this.gain = Math.min(3.2, this.gain + 0.15);
                this.offset = Math.min(40, this.offset + 6);
            } else if (contrast < 18) {
                this.gain = Math.min(2.8, this.gain + 0.08);
            }

            // Aggressive search if failing
            this.failStreak++;
            if (this.failStreak > 12) {
                this.gain *= 1.08;
                this.offset -= 5;
            }

            // Clamp
            this.gain = Math.max(0.5, Math.min(3.5, this.gain));
            this.offset = Math.max(-140, Math.min(60, this.offset));
        }
    }

    const controllers = {
        r: new SmartController(),
        g: new SmartController(),
        b: new SmartController()
    };

    // === ALGORITHMS ===
    function applySCIMath(data, ch, ctrl) {
        const d = data.data;
        const k1 = ctrl.k1, k2 = ctrl.k2;
        const gain = ctrl.gain, offset = ctrl.offset;

        for (let i = 0; i < d.length; i += 4) {
            const r = d[i], g = d[i+1], b = d[i+2];
            let target = ch === 'r' ? r : (ch === 'g' ? g : b);
            let n1 = ch === 'r' ? g : (ch === 'g' ? r : r);
            let n2 = ch === 'r' ? b : (ch === 'g' ? b : g);

            let res = (target - (n1 * k1 + n2 * k2)) * gain + offset;
            res = Math.max(0, Math.min(255, res));
            d[i] = d[i+1] = d[i+2] = res;
            d[i+3] = 255;
        }
    }

    function applyBradleyStandard(imgData, chIdx) {
        const w = imgData.width, h = imgData.height;
        const input = imgData.data;
        const output = new Uint8ClampedArray(w * h * 4);
        const intImg = new Int32Array(w * h);
        const s = Math.floor(w / 8), t = 15;

        for (let y = 0; y < h; y++) {
            let sum = 0;
            for (let x = 0; x < w; x++) {
                sum += input[(y * w + x) * 4 + chIdx];
                intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
            }
        }

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                const count = (x2 - x1 + 1) * (y2 - y1 + 1);
                const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                const val = input[(y * w + x) * 4 + chIdx];
                const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                const idx = (y * w + x) * 4;
                output[idx] = output[idx+1] = output[idx+2] = res;
                output[idx+3] = 255;
            }
        }
        return new ImageData(output, w, h);
    }

    // === MAIN LOOP ===
    function processLoop() {
        if (!state.scanning) return;

        // Frame skip logic
        state.frameSkip = (state.frameSkip + 1) % (state.FRAME_SKIP_MAX + 1);
        if (state.frameSkip !== 0) {
            requestAnimationFrame(processLoop);
            return;
        }

        // Get Frame
        let currentImageData = null;
        if (els.video.readyState >= 2) {
            // Draw video to main canvas for processing
            // Use the smaller dimension for square crop
            const vw = els.video.videoWidth, vh = els.video.videoHeight;
            const size = Math.min(vw, vh);
            // Draw centered crop to canvas (512x512)
            els.ctx.drawImage(els.video, (vw-size)/2, (vh-size)/2, size, size, 0, 0, 512, 512);
            currentImageData = els.ctx.getImageData(0, 0, 512, 512);
        }

        if (!currentImageData) {
            requestAnimationFrame(processLoop);
            return;
        }

        // Progress Bar Update
        if (state.accumulationStart) {
            const elapsed = Date.now() - state.accumulationStart;
            const percent = Math.min(100, (elapsed / state.ACC_DURATION) * 100);
            els.progressFill.style.width = percent + '%';
            
            if (elapsed > state.ACC_DURATION) {
                // Stop if time runs out
                stopScanning();
                return;
            }
        }

        // Round-Robin
        const channels = ['r', 'g', 'b'];
        const chKey = channels[state.currentChannelIndex];
        state.currentChannelIndex = (state.currentChannelIndex + 1) % 3;

        if (state.locked[chKey]) {
            requestAnimationFrame(processLoop);
            return;
        }

        const ctrl = controllers[chKey];
        const chIdx = chKey === 'r' ? 0 : (chKey === 'g' ? 1 : 2);
        let processed = null;

        // Hybrid Logic
        if (ctrl.failStreak < 8) {
            processed = applyBradleyStandard(currentImageData, chIdx);
            // HUD: Passive/Hunting
            if (!els.viewfinder.classList.contains('viewfinder-hunting')) {
                els.viewfinder.classList.remove('viewfinder-locked');
                els.viewfinder.classList.add('viewfinder-hunting');
            }
        } else {
            // Active Search + SCI
            if (!workBuffer) workBuffer = new Uint8ClampedArray(currentImageData.data);
            workBuffer.set(currentImageData.data);
            
            const tempData = new ImageData(workBuffer, 512, 512);
            applySCIMath(tempData, chKey, ctrl);
            processed = applyBradleyStandard(tempData, 0); // result is grayscale
            
            ctrl.updateMetrics(processed);
            
            // Visual Feedback (show processed data)
            els.ctx.putImageData(processed, 0, 0);
        }

        const code = jsQR(processed.data, 512, 512, { inversionAttempts: "attemptBoth" });

        if (code) {
            lockChannel(chKey, code.data);
        }

        requestAnimationFrame(processLoop);
    }

    function lockChannel(ch, data) {
        if(state.locked[ch]) return; // Prevent re-locking

        state.locked[ch] = true;
        state.results[ch] = data;

        // UI Flash
        playBeep();
        flashScreen();
        els.viewfinder.classList.remove('viewfinder-hunting');
        els.viewfinder.classList.add('viewfinder-locked');
        setTimeout(() => els.viewfinder.classList.remove('viewfinder-locked'), 300);

        // Fill Input
        const el = els[ch];
        el.value = data;
        el.classList.add('locked', 'locked-'+ch);

        // Start Accumulation Timer if first lock
        if (!state.accumulationStart) {
            state.accumulationStart = Date.now();
            els.progress.classList.add('progress-active');
        }

        // Check if all locked
        if (state.locked.r && state.locked.g && state.locked.b) {
            console.log("All channels decoded!");
            stopScanning();
            // Generate final QR in main canvas
            generateQR(); 
        }
    }

    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 880;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }

    function flashScreen() {
        els.flash.classList.add('flash-anim');
        setTimeout(() => els.flash.classList.remove('flash-anim'), 400);
    }

    // === FLOW CONTROL ===
    function initScanMode() {
        els.initActions.classList.add('hidden');
        els.scanActions.classList.remove('hidden');
        // Auto-start camera? No, let user choose.
    }

    async function startCamera() {
        globalReset(); // Clear previous data
        els.viewfinder.classList.remove('hidden'); // Show HUD
        els.progress.classList.remove('progress-active'); // Hide progress initially
        els.progressFill.style.width = '0%';
        els.saveBtn.classList.add('hidden');

        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: {ideal: 1280} } });
            els.video.srcObject = s; 
            els.video.play();
            els.video.classList.remove('hidden');
            els.main.classList.add('hidden'); // Hide canvas when video active
            els.freeze.classList.add('hidden');

            state.scanning = true;
            requestAnimationFrame(processLoop);
        } catch(e) { alert("Camera Error: " + e); }
    }

    function stopScanning() {
        state.scanning = false;
        if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
        
        els.viewfinder.classList.add('hidden');
        els.progress.classList.remove('progress-active');
        els.video.classList.add('hidden');
        els.main.classList.remove('hidden');
        
        // If we have results, show save button
        if (state.locked.r || state.locked.g || state.locked.b) {
            els.saveBtn.classList.remove('hidden');
            // Flash the main canvas to show result
            generateQR();
        }
    }

    function handleFile(e) {
        const file = e.target.files[0]; 
        if (!file) return;
        
        globalReset();
        els.viewfinder.classList.remove('hidden');
        els.progress.classList.add('progress-active'); // Start progress visual immediately for file
        state.accumulationStart = Date.now(); // Simulate accumulation timer

        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const s = 512; // Process size
                els.freeze.width = s; els.freeze.height = s;
                const ctx = els.fCtx;
                
                // Draw centered crop
                const min = Math.min(img.width, img.height);
                ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, s, s);
                
                els.freeze.classList.remove('hidden');
                els.main.classList.add('hidden');
                els.video.classList.add('hidden');

                // Run process loop manually for static image
                // We need to loop until all found or time out.
                // Hack: set scanning true, but override frame source in loop logic
                // For simplicity, let's just process once here for the file
                
                const imageData = ctx.getImageData(0, 0, s, s);
                
                // Try all channels
                let foundAny = false;
                ['r', 'g', 'b'].forEach(ch => {
                    if(state.locked[ch]) return;
                    const idx = ch === 'r' ? 0 : (ch === 'g' ? 1 : 2);
                    const ctrl = controllers[ch];
                    
                    // Try Standard
                    let proc = applyBradleyStandard(imageData, idx);
                    let code = jsQR(proc.data, s, s, { inversionAttempts: "attemptBoth" });
                    
                    if(!code) {
                        // Try SCI
                        if (!workBuffer) workBuffer = new Uint8ClampedArray(imageData.data);
                        workBuffer.set(imageData.data);
                        const tempData = new ImageData(workBuffer, s, s);
                        applySCIMath(tempData, ch, ctrl);
                        proc = applyBradleyStandard(tempData, 0);
                        code = jsQR(proc.data, s, s, { inversionAttempts: "attemptBoth" });
                    }

                    if(code) {
                        lockChannel(ch, code.data);
                        foundAny = true;
                    }
                });

                if(foundAny) {
                   generateQR();
                   els.saveBtn.classList.remove('hidden');
                }
                
                els.viewfinder.classList.add('hidden');
                els.progress.classList.remove('progress-active');
                els.freeze.classList.remove('hidden'); // Show the image
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function globalReset() {
        stopCamera(); 
        els.r.value = ""; els.g.value = ""; els.b.value = "";
        els.r.classList.remove('locked', 'locked-r');
        els.g.classList.remove('locked', 'locked-g');
        els.b.classList.remove('locked', 'locked-b');
        
        state.locked = {r:false, g:false, b:false};
        state.results = {r:null, g:null, b:null};
        state.accumulationStart = null;
        state.currentChannelIndex = 0;

        controllers.r = new SmartController();
        controllers.g = new SmartController();
        controllers.b = new SmartController();
        
        generateQR(); 
        els.saveBtn.classList.add('hidden');
        els.freeze.classList.add('hidden');
        els.video.classList.add('hidden');
        els.main.classList.remove('hidden');
        
        // Reset buttons
        els.initActions.classList.remove('hidden');
        els.scanActions.classList.add('hidden');
    }

    function stopCamera() {
        state.scanning = false;
        if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
    }

    // === QR GENERATION ===
    function generateQR() {
        const texts = [els.r.value, els.g.value, els.b.value];
        if (!texts.some(t => t.trim())) {
            els.main.style.opacity = 0.1;
            els.saveBtn.classList.add('hidden');
            return;
        }
        els.main.style.opacity = 1;
        
        let maxVer = 1;
        texts.forEach(t => {
            if(!t.trim()) return;
            const tmp = qrcode(0, 'M'); 
            tmp.addData(unescape(encodeURIComponent(t))); tmp.make();
            const v = Math.floor((tmp.getModuleCount() - 17) / 4);
            if (v > maxVer) maxVer = v;
        });
        
        const ctx = els.ctx;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
        ctx.globalCompositeOperation = "lighten";
        
        texts.forEach((text, i) => {
            if(!text.trim()) return;
            const qr = qrcode(maxVer, 'M'); 
            qr.addData(unescape(encodeURIComponent(text))); qr.make();
            const mod = 512 / qr.getModuleCount();
            ctx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
            for (let r = 0; r < qr.getModuleCount(); r++) {
                for (let c = 0; c < qr.getModuleCount(); c++) {
                    if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
                }
            }
        });
        ctx.globalCompositeOperation = "source-over";
        els.saveBtn.classList.remove('hidden');
    }

    // === UI HELPERS ===
    function setLanguage(l) {
        currentLang = l;
        els.r.placeholder = translations[l].ph_r;
        els.g.placeholder = translations[l].ph_g;
        els.b.placeholder = translations[l].ph_b;
    }

    function openModal(t) {
        document.getElementById('modal-overlay').classList.add('show');
        els.dropdown.classList.remove('show');
    }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
    function saveQR() { 
        const a = document.createElement('a'); 
        a.download = 'QRGB13_Result.png'; 
        a.href = els.main.toDataURL(); 
        a.click(); 
    }

    // === INIT ===
    document.getElementById('file-input').addEventListener('change', handleFile);
    [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));
    document.getElementById('menu-btn').onclick = (e) => { e.stopPropagation(); els.dropdown.classList.toggle('show'); };
    document.onclick = () => els.dropdown.classList.remove('show');
    
    setLanguage('uk');
    generateQR();

</script>
</body>
