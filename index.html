<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB-11: Accumulative Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --r-color: #FF004D; --g-color: #00FF41; --b-color: #0088FF; --bg-color: #050505;
        }
        body { background: var(--bg-color); color: #fff; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Main Canvas Container - Full Focus */
        .canvas-container {
            flex: 1; display: flex; justify-content: center; align-items: center; position: relative;
            background: radial-gradient(circle at 50% 50%, #111, #000);
        }
        #qr-main { width: 100%; height: 100%; object-fit: contain; }
        #video { display: none; position: absolute; width: 100%; height: 100%; object-fit: cover; }
        #freeze-frame { display: none; position: absolute; width: 100%; height: 100%; object-fit: contain; background: #000; }

        /* Bottom Input Panel - Semi-transparent */
        .input-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(12px);
            padding: 20px 16px 30px; border-top: 1px solid rgba(255,255,255,0.1);
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }
        .input-panel.show { transform: translateY(0); }

        .input-grid { display: flex; gap: 10px; }
        .input-box { flex: 1; position: relative; }
        .input-box textarea {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; resize: none; width: 100%; height: 40px; border-radius: 8px;
            padding: 8px 12px; font-size: 12px; text-align: center; transition: all 0.2s;
        }
        .input-box textarea:focus { outline: none; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); }
        
        /* Indicators */
        .indicator {
            position: absolute; top: -6px; right: -4px;
            width: 10px; height: 10px; border-radius: 50%; background: #333;
            border: 2px solid var(--bg-color); transition: all 0.2s;
        }
        .indicator.r.active { background: var(--r-color); box-shadow: 0 0 8px var(--r-color); }
        .indicator.g.active { background: var(--g-color); box-shadow: 0 0 8px var(--g-color); }
        .indicator.b.active { background: var(--b-color); box-shadow: 0 0 8px var(--b-color); }

        /* Button & Controls */
        .scan-btn {
            position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
            padding: 14px 40px; background: #fff; color: #000; font-weight: 800;
            border-radius: 30px; font-size: 16px; border: none; box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: all 0.3s; z-index: 10;
        }
        .scan-btn:active { transform: translateX(-50%) scale(0.95); }
        .scan-btn.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) scale(0.8); }

        /* Flash Effects */
        .flash-layer { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 50; }
        .flash-layer.success { animation: flashSuccess 0.6s ease-out; }
        .flash-layer.fail { animation: flashFail 0.4s ease-out; background: #ff004d; }
        
        @keyframes flashSuccess { 0% { opacity: 0; } 30% { opacity: 0.8; } 100% { opacity: 0; } }
        @keyframes flashFail { 0% { opacity: 0; } 20% { opacity: 0.5; } 100% { opacity: 0; } }

        /* Progress Bar */
        .progress-bar {
            position: absolute; top: 0; left: 0; height: 3px; background: var(--g-color);
            width: 0%; box-shadow: 0 0 10px var(--g-color); transition: width 0.1s linear; z-index: 15;
        }
    </style>
</head>
<body>

    <!-- Main Canvas -->
    <div class="canvas-container">
        <canvas id="qr-main" width="512" height="512"></canvas>
        <video id="video" playsinline autoplay muted></video>
        <canvas id="freeze-frame"></canvas>
        <div class="progress-bar" id="progress-bar"></div>
        <div class="flash-layer" id="flash-layer"></div>
        
        <button id="btn-scan" class="scan-btn" onclick="startSession()">SCAN</button>
    </div>

    <!-- Bottom Panel -->
    <div class="input-panel" id="input-panel">
        <div class="input-grid">
            <div class="input-box">
                <div class="indicator r" id="ind-r"></div>
                <textarea id="r-text" placeholder="RED" readonly></textarea>
            </div>
            <div class="input-box">
                <div class="indicator g" id="ind-g"></div>
                <textarea id="g-text" placeholder="GREEN" readonly></textarea>
            </div>
            <div class="input-box">
                <div class="indicator b" id="ind-b"></div>
                <textarea id="b-text" placeholder="BLUE" readonly></textarea>
            </div>
        </div>
        <div class="flex justify-center mt-4 gap-4">
            <button onclick="globalReset()" class="text-xs text-zinc-400 border border-zinc-700 px-4 py-1 rounded-full">RESET</button>
            <button onclick="saveResult()" class="text-xs text-green-400 border border-green-700 px-4 py-1 rounded-full opacity-0 transition-opacity" id="btn-save">SAVE</button>
        </div>
    </div>

<script>
    // === 1. STATE & CONFIG ===
    const state = {
        scanning: false,
        locked: { r: false, g: false, b: false },
        results: { r: null, g: null, b: null },
        currentChannelIndex: 0, // Round-robin index
        
        // Accumulation Logic
        sessionActive: false,
        sessionStartTime: 0,
        CAPTURE_WINDOW: 4000, // 4 seconds
        
        // Performance
        frameSkip: 0,
        FRAME_SKIP_MAX: 3, // Default ~20fps processing
        FRAME_SKIP_FAST: 0 // Max speed during session
    };

    const els = {
        video: document.getElementById('video'),
        canvas: document.getElementById('qr-main'),
        ctx: document.getElementById('qr-main').getContext('2d', { willReadFrequently: true }),
        freeze: document.getElementById('freeze-frame'),
        fCtx: document.getElementById('freeze-frame').getContext('2d', { willReadFrequently: true }),
        r: document.getElementById('r-text'), g: document.getElementById('g-text'), b: document.getElementById('b-text'),
        indR: document.getElementById('ind-r'), indG: document.getElementById('ind-g'), indB: document.getElementById('ind-b'),
        flash: document.getElementById('flash-layer'),
        progressBar: document.getElementById('progress-bar'),
        inputPanel: document.getElementById('input-panel'),
        btnSave: document.getElementById('btn-save'),
        btnScan: document.getElementById('btn-scan')
    };

    // Reusable buffers
    let workBuffer = null;
    let sourceCopy = null;

    // === 2. SMART CONTROLLER ===
    class SmartController {
        constructor() {
            this.gain = 1.0;
            this.offset = 0;
            this.k1 = 0.15;
            this.k2 = 0.25;
            this.prevBrightRatio = 0.5;
            this.failStreak = 0;
        }

        updateMetrics(imgData) {
            const d = imgData.data;
            let bright = 0, sum = 0;
            const len = d.length / 4;
            for (let i = 0; i < d.length; i += 4) {
                const v = d[i];
                sum += v;
                if (v > 240) bright++;
            }
            const mean = sum / len;
            const brightRatio = bright / len;

            // Feedback Logic
            if (brightRatio > 0.35) {
                this.gain = Math.max(0.6, this.gain - 0.12);
                this.offset = Math.max(-120, this.offset - 8);
            } else if (brightRatio < 0.15) {
                this.gain = Math.min(3.2, this.gain + 0.15);
                this.offset = Math.min(40, this.offset + 6);
            }
            
            // Clamp
            this.gain = Math.max(0.5, Math.min(3.5, this.gain));
            this.offset = Math.max(-140, Math.min(60, this.offset));
        }
    }

    const controllers = { r: new SmartController(), g: new SmartController(), b: new SmartController() };

    // === 3. ALGORITHMS ===
    function applySCIMath(data, ch, ctrl) {
        const d = data.data;
        for (let i = 0; i < d.length; i += 4) {
            const r = d[i], g = d[i+1], b = d[i+2];
            let target = ch === 'r' ? r : (ch === 'g' ? g : b);
            let n1 = ch === 'r' ? g : (ch === 'g' ? r : r);
            let n2 = ch === 'r' ? b : (ch === 'g' ? b : g);

            let res = (target - (n1 * ctrl.k1 + n2 * ctrl.k2)) * ctrl.gain + ctrl.offset;
            res = Math.max(0, Math.min(255, res));
            d[i] = d[i+1] = d[i+2] = res; d[i+3] = 255;
        }
    }

    function applyBradleyStandard(imgData, chIdx) {
        const w = imgData.width, h = imgData.height;
        const input = imgData.data;
        const output = new Uint8ClampedArray(w * h * 4);
        const intImg = new Int32Array(w * h);
        const s = Math.floor(w / 8), t = 15;

        for (let y = 0; y < h; y++) {
            let sum = 0;
            for (let x = 0; x < w; x++) {
                sum += input[(y * w + x) * 4 + chIdx];
                intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
            }
        }

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                const count = (x2 - x1 + 1) * (y2 - y1 + 1);
                const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                const val = input[(y * w + x) * 4 + chIdx];
                const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                const idx = (y * w + x) * 4;
                output[idx] = output[idx+1] = output[idx+2] = res; output[idx+3] = 255;
            }
        }
        return new ImageData(output, w, h);
    }

    // === 4. MAIN PROCESSING LOOP (Hybrid + Accumulation) ===
    function processLoop() {
        if (!state.scanning) return;

        // Frame Skipping Logic
        state.frameSkip = (state.frameSkip + 1) % (state.sessionActive ? state.FRAME_SKIP_FAST + 1 : state.FRAME_SKIP_MAX + 1);
        if (state.frameSkip !== 0) {
            requestAnimationFrame(processLoop);
            return;
        }

        // 1. Get Frame Data
        let currentImageData = null;
        if (els.video.style.display !== 'none' && els.video.readyState >= 2) {
            els.ctx.drawImage(els.video, 0, 0, 512, 512);
            currentImageData = els.ctx.getImageData(0, 0, 512, 512);
        } else if (els.freeze.style.display !== 'none') {
            currentImageData = els.fCtx.getImageData(0, 0, 512, 512);
        }

        if (!currentImageData) { requestAnimationFrame(processLoop); return; }

        // 2. Check Session Timeout
        if (state.sessionActive) {
            const elapsed = Date.now() - state.sessionStartTime;
            // Update Progress Bar
            const progress = Math.min(100, (elapsed / state.CAPTURE_WINDOW) * 100);
            els.progressBar.style.width = `${progress}%`;

            if (elapsed > state.CAPTURE_WINDOW) {
                const lockedCount = (state.locked.r ? 1 : 0) + (state.locked.g ? 1 : 0) + (state.locked.b ? 1 : 0);
                if (lockedCount < 3) {
                    console.log("Session Timeout - Reset");
                    resetSession(); // Failure
                    requestAnimationFrame(processLoop);
                    return;
                }
            }
        }

        // 3. Round-Robin Channel Selection
        const channels = ['r', 'g', 'b'];
        let chKey = channels[state.currentChannelIndex];
        
        // Skip locked channels
        if (state.locked[chKey]) {
             // If all locked, stop? No, keep looping for stability or stop.
             // But logic says ignore locked. So find next unlocked.
             let foundNext = false;
             for(let i=0; i<3; i++) {
                 state.currentChannelIndex = (state.currentChannelIndex + 1) % 3;
                 chKey = channels[state.currentChannelIndex];
                 if (!state.locked[chKey]) { foundNext = true; break; }
             }
             if (!foundNext) { /* All locked */ requestAnimationFrame(processLoop); return; }
        } else {
            state.currentChannelIndex = (state.currentChannelIndex + 1) % 3;
        }

        const ctrl = controllers[chKey];
        const chIdx = chKey === 'r' ? 0 : (chKey === 'g' ? 1 : 2);
        let processed = null;

        // 4. Hybrid Processing Strategy
        if (ctrl.failStreak < 8) {
            processed = applyBradleyStandard(currentImageData, chIdx);
        } else {
            if (!workBuffer) workBuffer = new Uint8ClampedArray(currentImageData.data);
            workBuffer.set(currentImageData.data);
            const tempData = new ImageData(workBuffer, 512, 512);
            
            applySCIMath(tempData, chKey, ctrl);
            processed = applyBradleyStandard(tempData, 0);
            ctrl.updateMetrics(processed);
        }

        // 5. Decode
        const code = jsQR(processed.data, 512, 512, { inversionAttempts: "attemptBoth" });

        // 6. Visualization (HUD)
        // Clear canvas and redraw base (to clear previous HUD text)
        els.ctx.putImageData(currentImageData, 0, 0); // Base layer
        
        if (code) {
            // SUCCESS FRAME (White)
            drawFrame(code.location, '#FFFFFF', 2);
            lockChannel(chKey, code.data);
        } else {
            ctrl.failStreak++;
            // SEARCHING FRAME (Gray) - Generic pulsing frame or nothing? 
            // jsQR doesn't give location on fail. Just draw HUD text.
        }

        // Draw HUD Text (Gain/Offset)
        drawHUD(chKey, ctrl);

        requestAnimationFrame(processLoop);
    }

    // === 5. VISUALIZATION (HUD) ===
    function drawFrame(location, color, width) {
        els.ctx.strokeStyle = color;
        els.ctx.lineWidth = width;
        els.ctx.beginPath();
        els.ctx.moveTo(location.topLeftCorner.x, location.topLeftCorner.y);
        els.ctx.lineTo(location.topRightCorner.x, location.topRightCorner.y);
        els.ctx.lineTo(location.bottomRightCorner.x, location.bottomRightCorner.y);
        els.ctx.lineTo(location.bottomLeftCorner.x, location.bottomLeftCorner.y);
        els.ctx.closePath();
        els.ctx.stroke();
    }

    function drawHUD(chKey, ctrl) {
        const chName = chKey.toUpperCase();
        const text = `[${chName}] G:${ctrl.gain.toFixed(1)} O:${ctrl.offset.toFixed(0)}`;
        
        els.ctx.font = '12px JetBrains Mono';
        els.ctx.fillStyle = state.locked[chKey] ? '#00FF41' : 'rgba(255,255,255,0.5)';
        
        // Position text in corners based on channel
        let x = 10, y = 20;
        if (chKey === 'r') { x = 10; y = 20; }
        if (chKey === 'g') { x = 10; y = 40; }
        if (chKey === 'b') { x = 10; y = 60; }
        
        els.ctx.fillText(text, x, y);
    }

    // === 6. LOGIC (Accumulation) ===
    function lockChannel(ch, data) {
        if (state.locked[ch]) return; // Already locked

        state.locked[ch] = true;
        state.results[ch] = data;
        controllers[ch].failStreak = 0; // Reset controller on success

        // UI Update
        playBeep();
        const el = els[ch];
        const ind = els['ind' + ch.toUpperCase()];
        ind.classList.add('active');
        el.value = data;
        el.style.borderColor = ch === 'r' ? '#FF004D' : (ch === 'g' ? '#00FF41' : '#0088FF');
        
        // Session Logic
        if (!state.sessionActive) {
            startAccumulationWindow();
        }

        // Check Win Condition
        if (state.locked.r && state.locked.g && state.locked.b) {
            finalSynthesis();
        }
    }

    function startAccumulationWindow() {
        state.sessionActive = true;
        state.sessionStartTime = Date.now();
        state.FRAME_SKIP_MAX = state.FRAME_SKIP_FAST; // Speed up!
        console.log("Session Started: 4s window");
    }

    function finalSynthesis() {
        state.scanning = false; // Stop loop
        state.sessionActive = false;
        
        // Success Flash
        els.flash.classList.add('success');
        setTimeout(() => els.flash.classList.remove('success'), 600);
        
        els.btnSave.style.opacity = '1';
        console.log("Synthesis Complete!");
    }

    function resetSession() {
        state.sessionActive = false;
        state.FRAME_SKIP_MAX = 3; // Slow down
        
        // Red Flash
        els.flash.classList.add('fail');
        setTimeout(() => els.flash.classList.remove('fail'), 400);
        
        // Reset only unlocked channels? Or all progress?
        // Requirement: "If time runs out... < 3 channels -> resetSession()".
        // I will reset the 'locked' state to force retry, but keep text values.
        ['r', 'g', 'b'].forEach(ch => {
            if (!state.locked[ch]) return; // Only reset active attempts
            // Actually, if we failed, we should reset everything to allow clean retry.
            state.locked[ch] = false;
            controllers[ch].failStreak = 0;
            els['ind' + ch.toUpperCase()].classList.remove('active');
            els[ch].value = "";
            els[ch].style.borderColor = "rgba(255,255,255,0.1)";
        });
        
        // Force full reset for demo purposes
        state.locked = {r:false, g:false, b:false};
        updateIndicators();
    }

    function updateIndicators() {
        ['r','g','b'].forEach(ch => {
            const ind = els['ind' + ch.toUpperCase()];
            if(state.locked[ch]) ind.classList.add('active');
            else ind.classList.remove('active');
        });
    }

    // === 7. CORE FUNCTIONS ===
    function startSession() {
        els.btnScan.classList.add('hidden');
        els.inputPanel.classList.add('show');
        
        // Try Camera first, fallback to Gallery? 
        // Just Camera for now as per logic.
        startCamera();
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
            els.video.srcObject = stream;
            els.video.play();
            els.video.style.display = 'block';
            els.freeze.style.display = 'none';
            
            globalReset(); // Clean state
            state.scanning = true;
            processLoop();
        } catch (e) {
            alert("Camera Error: " + e);
        }
    }

    function handleFile(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                els.freeze.width = 512; els.freeze.height = 512;
                const s = Math.min(img.width, img.height);
                const sx = (img.width - s)/2, sy = (img.height - s)/2;
                els.fCtx.drawImage(img, sx, sy, s, s, 0, 0, 512, 512);
                
                els.freeze.style.display = 'block';
                els.video.style.display = 'none';
                els.btnScan.classList.add('hidden');
                els.inputPanel.classList.add('show');

                globalReset();
                state.scanning = true;
                processLoop();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function globalReset() {
        state.scanning = false;
        state.locked = {r:false, g:false, b:false};
        state.results = {r:null, g:null, b:null};
        state.sessionActive = false;
        state.frameSkip = 0;
        
        Object.values(controllers).forEach(c => { c.gain = 1.0; c.offset = 0; c.failStreak = 0; });
        
        updateIndicators();
        els.progressBar.style.width = '0%';
        els.btnSave.style.opacity = '0';
    }

    function playBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = 880; o.type = "square";
            g.gain.setValueAtTime(0.1, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
            o.start(); o.stop(ctx.currentTime + 0.1);
        } catch(e){}
    }

    function saveResult() {
        // Generate Multi-QR
        const texts = [els.r.value, els.g.value, els.b.value];
        if(!texts.some(t => t.trim())) return;
        
        const qrCtx = els.canvas.getContext('2d');
        qrCtx.fillStyle = "#000"; qrCtx.fillRect(0,0,512,512);
        qrCtx.globalCompositeOperation = "lighten";
        
        texts.forEach((text, i) => {
            if(!text.trim()) return;
            const qr = qrcode(0, 'M'); qr.addData(text); qr.make();
            const mod = 512 / qr.getModuleCount();
            qrCtx.fillStyle = i === 0 ? "#FF0000" : (i === 1 ? "#00FF00" : "#0000FF");
            for(let r=0; r<qr.getModuleCount(); r++){
                for(let c=0; c<qr.getModuleCount(); c++){
                    if(qr.isDark(r,c)) qrCtx.fillRect(c*mod, r*mod, mod, mod);
                }
            }
        });
        qrCtx.globalCompositeOperation = "source-over";

        const a = document.createElement('a');
        a.href = els.canvas.toDataURL();
        a.download = 'rgb11_result.png';
        a.click();
    }

    // Expose functions
    window.startSession = startSession;
    window.handleFile = handleFile;
    window.globalReset = globalReset;
    window.saveResult = saveResult;

</script>
</body>
</html>
